services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-garimzap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-garimzap}
      POSTGRES_DB: ${POSTGRES_DB:-garimzap}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
